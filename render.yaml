services:
  - type: web
    name: pubquiz-master
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist/client
    routes:
      - type: rewrite
        source: /blog_and_tipps
        destination: /blog_and_tipps/index.html
      - type: rewrite
        source: /blog_and_tipps/*
        destination: /blog_and_tipps/index.html
      - type: rewrite
        source: /*
        destination: /index.html
